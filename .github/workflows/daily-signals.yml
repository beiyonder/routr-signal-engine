name: daily-signals

on:
  schedule:
    # 07:00 UTC daily — 12:30 IST, 02:00 EST, 08:00 CET.
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip Slack/Discord/email POSTs and skip git commit"
        type: boolean
        default: false
      sources:
        description: "Comma-separated source override (e.g., 'hn,reddit'). Empty = all enabled."
        type: string
        default: ""

permissions:
  contents: read   # pipeline state lives in Actions cache + artifacts, NOT in git

concurrency:
  group: daily-signals
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Install Playwright Chromium (X fallback)
        run: |
          python -m playwright install --with-deps chromium

      - name: Restore pipeline state (intel.db + anchor embedding cache)
        uses: actions/cache/restore@v4
        with:
          path: |
            data/intel.db
            data/intel.db-shm
            data/intel.db-wal
            data/cache/anchors-*.json
          # Rolling key: each run writes a fresh entry; restore-keys picks the
          # most recent. SQLite WAL files travel with the main db.
          key: pipeline-state-${{ github.run_id }}
          restore-keys: |
            pipeline-state-

      - name: Resolve runtime flags
        id: flags
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_SOURCES: ${{ github.event.inputs.sources }}
        run: |
          if [ "${INPUT_DRY_RUN}" = "true" ]; then
            echo "publish=0" >> $GITHUB_OUTPUT
          else
            echo "publish=1" >> $GITHUB_OUTPUT
          fi
          if [ -n "${INPUT_SOURCES}" ]; then
            echo "sources=${INPUT_SOURCES}" >> $GITHUB_OUTPUT
          else
            echo "sources=hn,reddit,github_issues,twitter,discord_paste,hf_papers,newsletters" >> $GITHUB_OUTPUT
          fi

      - name: Run pipeline
        env:
          # LLM provider/model split between classifier (cheap) and drafter (flagship)
          ROUTR_SIGNAL_LLM_PROVIDER:      ${{ vars.ROUTR_SIGNAL_LLM_PROVIDER      || 'anthropic' }}
          ROUTR_SIGNAL_LLM_MODEL:         ${{ vars.ROUTR_SIGNAL_LLM_MODEL }}
          ROUTR_SIGNAL_DRAFTER_PROVIDER:  ${{ vars.ROUTR_SIGNAL_DRAFTER_PROVIDER  || 'gemini' }}
          ROUTR_SIGNAL_DRAFTER_MODEL:     ${{ vars.ROUTR_SIGNAL_DRAFTER_MODEL     || 'gemini-3-pro-preview' }}
          # All three LLM keys (only the selected providers' are used)
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
          # Outputs (Discord primary; Slack + email optional)
          DISCORD_WEBHOOK_URL:    ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL:      ${{ secrets.SLACK_WEBHOOK_URL }}
          EMAIL_SMTP_HOST:        ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT:        ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SMTP_USER:        ${{ secrets.EMAIL_SMTP_USER }}
          EMAIL_SMTP_PASS:        ${{ secrets.EMAIL_SMTP_PASS }}
          EMAIL_FROM:             ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:               ${{ secrets.EMAIL_TO }}
          # GitHub API
          GITHUB_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          # X / Twitter (burner credentials + base64'd cookie jar from Playwright)
          TWITTER_USERNAME:       ${{ secrets.TWITTER_USERNAME }}
          TWITTER_EMAIL:          ${{ secrets.TWITTER_EMAIL }}
          TWITTER_PASSWORD:       ${{ secrets.TWITTER_PASSWORD }}
          TWITTER_TOTP_SECRET:    ${{ secrets.TWITTER_TOTP_SECRET }}
          TWITTER_COOKIES_B64:    ${{ secrets.TWITTER_COOKIES_B64 }}
          ROUTR_SIGNAL_TWITTER_DELAY_S: ${{ vars.ROUTR_SIGNAL_TWITTER_DELAY_S || '30' }}
          # Run-time flags
          ROUTR_SIGNAL_SOURCES:   ${{ steps.flags.outputs.sources }}
          ROUTR_SIGNAL_PUBLISH:   ${{ steps.flags.outputs.publish }}
          ROUTR_SIGNAL_COMMIT:    "0"   # NEVER commit data/ back to the public repo
        run: routr-signal

      - name: Save pipeline state to Actions cache
        # Always save so dedupe survives even if the pipeline emitted no
        # publishable items today. Keyed on run_id; restore-keys picks the most
        # recent on the next run.
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/intel.db
            data/intel.db-shm
            data/intel.db-wal
            data/cache/anchors-*.json
          key: pipeline-state-${{ github.run_id }}

      - name: Upload raw data + digest as private artifact (90-day retention)
        # Artifacts on a public repo are downloadable only by repo collaborators
        # via the Actions UI / `gh run download`. They are NOT in git history.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.run_id }}
          path: |
            data/digests
            data/raw
            data/leads
          retention-days: 90
          if-no-files-found: ignore
