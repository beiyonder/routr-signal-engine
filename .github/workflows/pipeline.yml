name: pipeline

# One workflow file, five jobs, five cron triggers.
#
# Why one file: GitHub Actions cache is scoped to the workflow file. The
# dispatch worker and x_burst task MUST read the intel.db state produced
# by the daily and synthesis jobs, so they all live here to share the
# `pipeline-state-*` cache namespace.
#
# Concurrency group `pipeline` serializes runs against each other so cache
# writes never overlap. WITHIN a single run, `needs:` is used to order
# daily -> x_burst when both are triggered by the 02:30 UTC cron.
#
# Schedule (UTC -> IST):
#   30 2 * * *           02:30 UTC = 08:00 IST   triggers: daily + x_burst
#   0 7 * * *            07:00 UTC = 12:30 IST   triggers: x_burst only
#   0 14 * * 0           Sun 14:00 UTC = 19:30 IST triggers: synthesis
#   15,30,45 * * * *     every 15 min off :00    triggers: dispatch
#   5,20,35,50 * * * *   every 15 min             triggers: x_watch

on:
  schedule:
    - cron: "30 2 * * *"         # daily + x_burst (sequential)
    - cron: "0 7 * * *"          # x_burst only
    - cron: "0 14 * * 0"         # weekly synthesis Sundays
    - cron: "15,30,45 * * * *"   # dispatch-approved 3x/hour (off :00 to skip the 02:30 window)
    - cron: "5,20,35,50 * * * *" # fast X reply monitor
  workflow_dispatch:
    inputs:
      task:
        description: "Which task to run"
        type: choice
        required: true
        default: "dispatch"
        options:
          - daily
          - burst
          - synthesis
          - dispatch
          - x_watch
      dry_run:
        description: "Skip publish (daily / burst only)"
        type: boolean
        default: false
      sources:
        description: "Source override (daily only; comma-separated)"
        type: string
        default: ""
      burst_count:
        description: "Posts per burst (burst only)"
        type: string
        default: "2"
      x_watch_window_minutes:
        description: "Freshness window for x_watch dry-run testing"
        type: string
        default: "60"
      x_watch_min_age_minutes:
        description: "Minimum tweet age for x_watch"
        type: string
        default: "10"
      x_watch_min_score:
        description: "Minimum x_watch reply score"
        type: string
        default: "0.72"
      x_watch_max_alerts:
        description: "Max x_watch alerts per run"
        type: string
        default: "3"

permissions:
  contents: read

concurrency:
  group: pipeline
  cancel-in-progress: false

env:
  PIPELINE_CACHE_KEY: pipeline-state-${{ github.run_id }}

jobs:
  # ---------------------------------------------------------------------------
  # DAILY: fetch -> classify -> publish to Discord
  # ---------------------------------------------------------------------------
  daily:
    if: |
      github.event.schedule == '30 2 * * *' ||
      (github.event_name == 'workflow_dispatch' && inputs.task == 'daily')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Install Playwright Chromium (X fallback)
        run: python -m playwright install --with-deps chromium

      - name: Restore pipeline state
        uses: actions/cache/restore@v4
        with:
          path: |
            data/intel.db
            data/intel.db-shm
            data/intel.db-wal
            data/cache/anchors-*.json
          key: ${{ env.PIPELINE_CACHE_KEY }}
          restore-keys: |
            pipeline-state-

      - name: Resolve runtime flags
        id: flags
        env:
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_SOURCES: ${{ inputs.sources }}
        run: |
          if [ "${INPUT_DRY_RUN}" = "true" ]; then
            echo "publish=0" >> $GITHUB_OUTPUT
          else
            echo "publish=1" >> $GITHUB_OUTPUT
          fi
          if [ -n "${INPUT_SOURCES}" ]; then
            echo "sources=${INPUT_SOURCES}" >> $GITHUB_OUTPUT
          else
            echo "sources=hn,reddit,github_issues,twitter,discord_paste,hf_papers,newsletters" >> $GITHUB_OUTPUT
          fi

      - name: Run pipeline
        env:
          ROUTR_SIGNAL_LLM_PROVIDER:      ${{ vars.ROUTR_SIGNAL_LLM_PROVIDER      || 'anthropic' }}
          ROUTR_SIGNAL_LLM_MODEL:         ${{ vars.ROUTR_SIGNAL_LLM_MODEL }}
          ROUTR_SIGNAL_DRAFTER_PROVIDER:  ${{ vars.ROUTR_SIGNAL_DRAFTER_PROVIDER  || 'gemini' }}
          ROUTR_SIGNAL_DRAFTER_MODEL:     ${{ vars.ROUTR_SIGNAL_DRAFTER_MODEL     || 'gemini-3-pro-preview' }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL:    ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL:      ${{ secrets.SLACK_WEBHOOK_URL }}
          EMAIL_SMTP_HOST:        ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT:        ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SMTP_USER:        ${{ secrets.EMAIL_SMTP_USER }}
          EMAIL_SMTP_PASS:        ${{ secrets.EMAIL_SMTP_PASS }}
          EMAIL_FROM:             ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:               ${{ secrets.EMAIL_TO }}
          GITHUB_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          TWITTER_USERNAME:       ${{ secrets.TWITTER_USERNAME }}
          TWITTER_EMAIL:          ${{ secrets.TWITTER_EMAIL }}
          TWITTER_PASSWORD:       ${{ secrets.TWITTER_PASSWORD }}
          TWITTER_TOTP_SECRET:    ${{ secrets.TWITTER_TOTP_SECRET }}
          TWITTER_COOKIES_B64:    ${{ secrets.TWITTER_COOKIES_B64 }}
          ROUTR_SIGNAL_TWITTER_DELAY_S: ${{ vars.ROUTR_SIGNAL_TWITTER_DELAY_S || '30' }}
          ROUTR_SIGNAL_SOURCES:   ${{ steps.flags.outputs.sources }}
          ROUTR_SIGNAL_PUBLISH:   ${{ steps.flags.outputs.publish }}
          ROUTR_SIGNAL_COMMIT:    "0"
        run: routr-signal

      - name: Save pipeline state to Actions cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/intel.db
            data/intel.db-shm
            data/intel.db-wal
            data/cache/anchors-*.json
          key: ${{ env.PIPELINE_CACHE_KEY }}

      - name: Upload raw data + digest as private artifact (90-day retention)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.run_id }}
          path: |
            data/digests
            data/raw
            data/leads
          retention-days: 90
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # X_BURST: draft 2 standalone X posts from recent signals and auto-ship.
  # No Discord review; voice_lint is the safety net.
  #
  # `needs: [daily]` so that when both jobs are triggered by the 02:30 UTC
  # cron, x_burst runs AFTER daily finishes refreshing the DB. The
  # `if: always() && ...` lets x_burst still run when daily is skipped
  # (e.g. the 07:00 UTC cron only fires x_burst).
  # ---------------------------------------------------------------------------
  x_burst:
    needs: [daily]
    if: |
      always() && (
        github.event.schedule == '30 2 * * *' ||
        github.event.schedule == '0 7 * * *' ||
        (github.event_name == 'workflow_dispatch' && inputs.task == 'burst')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Restore pipeline state
        # Identical path list to the other jobs -- actions/cache hashes
        # the path list into the cache version, so they must match.
        uses: actions/cache/restore@v4
        with:
          path: |
            data/intel.db
            data/intel.db-shm
            data/intel.db-wal
            data/cache/anchors-*.json
          key: ${{ env.PIPELINE_CACHE_KEY }}
          restore-keys: |
            pipeline-state-

      - name: Resolve burst flags
        id: burst_flags
        env:
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_COUNT:   ${{ inputs.burst_count }}
        run: |
          if [ "${INPUT_DRY_RUN}" = "true" ]; then
            echo "dry_run=1" >> $GITHUB_OUTPUT
          else
            echo "dry_run=0" >> $GITHUB_OUTPUT
          fi
          if [ -n "${INPUT_COUNT}" ]; then
            echo "count=${INPUT_COUNT}" >> $GITHUB_OUTPUT
          else
            echo "count=2" >> $GITHUB_OUTPUT
          fi

      - name: Run x_burst
        env:
          ROUTR_SIGNAL_LLM_PROVIDER:      ${{ vars.ROUTR_SIGNAL_LLM_PROVIDER      || 'anthropic' }}
          ROUTR_SIGNAL_LLM_MODEL:         ${{ vars.ROUTR_SIGNAL_LLM_MODEL }}
          ROUTR_SIGNAL_DRAFTER_PROVIDER:  ${{ vars.ROUTR_SIGNAL_DRAFTER_PROVIDER  || 'gemini' }}
          ROUTR_SIGNAL_DRAFTER_MODEL:     ${{ vars.ROUTR_SIGNAL_DRAFTER_MODEL     || 'gemini-3-pro-preview' }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
          BUFFER_ACCESS_TOKEN:    ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_ORG_ID:          ${{ secrets.BUFFER_ORG_ID }}
          BUFFER_X_CHANNEL_ID:    ${{ secrets.BUFFER_X_CHANNEL_ID }}
          # The bot DMs the operator long-form drafts (>270 chars) for manual posting.
          # The bot must share a guild with the recipient and the recipient must allow
          # server-member DMs (Discord default).
          DISCORD_BOT_TOKEN:      ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:     ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_USER_DM_ID:     ${{ secrets.DISCORD_USER_DM_ID }}
          ROUTR_X_BURST_COUNT:    ${{ steps.burst_flags.outputs.count }}
          ROUTR_X_BURST_DRY_RUN:  ${{ steps.burst_flags.outputs.dry_run }}
        run: routr-burst

      - name: Save pipeline state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/intel.db
            data/intel.db-shm
            data/intel.db-wal
            data/cache/anchors-*.json
          key: ${{ env.PIPELINE_CACHE_KEY }}

  # ---------------------------------------------------------------------------
  # SYNTHESIS: Sunday cron, build weekly essay, post to Discord, pre-create
  # pending Beehiiv row
  # ---------------------------------------------------------------------------
  synthesis:
    if: |
      github.event.schedule == '0 14 * * 0' ||
      (github.event_name == 'workflow_dispatch' && inputs.task == 'synthesis')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Restore pipeline state
        uses: actions/cache/restore@v4
        with:
          path: |
            data/intel.db
            data/intel.db-shm
            data/intel.db-wal
            data/cache/anchors-*.json
          key: ${{ env.PIPELINE_CACHE_KEY }}
          restore-keys: |
            pipeline-state-

      - name: Run weekly synthesis
        env:
          ROUTR_SIGNAL_LLM_PROVIDER:      ${{ vars.ROUTR_SIGNAL_LLM_PROVIDER      || 'anthropic' }}
          ROUTR_SIGNAL_LLM_MODEL:         ${{ vars.ROUTR_SIGNAL_LLM_MODEL }}
          ROUTR_SIGNAL_DRAFTER_PROVIDER:  ${{ vars.ROUTR_SIGNAL_DRAFTER_PROVIDER  || 'gemini' }}
          ROUTR_SIGNAL_DRAFTER_MODEL:     ${{ vars.ROUTR_SIGNAL_DRAFTER_MODEL     || 'gemini-3-pro-preview' }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL:    ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: routr-synthesize

      - name: Save pipeline state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/intel.db
            data/intel.db-shm
            data/intel.db-wal
            data/cache/anchors-*.json
          key: ${{ env.PIPELINE_CACHE_KEY }}

  # ---------------------------------------------------------------------------
  # X_WATCH: monitor broad AI accounts for fast reply opportunities and DM them
  # ---------------------------------------------------------------------------
  x_watch:
    if: |
      github.event.schedule == '5,20,35,50 * * * *' ||
      (github.event_name == 'workflow_dispatch' && inputs.task == 'x_watch')
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Install Playwright Chromium (X fallback)
        run: python -m playwright install --with-deps chromium

      - name: Restore pipeline state
        uses: actions/cache/restore@v4
        with:
          path: |
            data/intel.db
            data/intel.db-shm
            data/intel.db-wal
            data/cache/anchors-*.json
          key: ${{ env.PIPELINE_CACHE_KEY }}
          restore-keys: |
            pipeline-state-

      - name: Run fast X watch
        env:
          ROUTR_SIGNAL_LLM_PROVIDER:      ${{ vars.ROUTR_SIGNAL_LLM_PROVIDER      || 'anthropic' }}
          ROUTR_SIGNAL_LLM_MODEL:         ${{ vars.ROUTR_SIGNAL_LLM_MODEL }}
          ROUTR_SIGNAL_DRAFTER_PROVIDER:  ${{ vars.ROUTR_SIGNAL_DRAFTER_PROVIDER  || 'gemini' }}
          ROUTR_SIGNAL_DRAFTER_MODEL:     ${{ vars.ROUTR_SIGNAL_DRAFTER_MODEL     || 'gemini-3-pro-preview' }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
          TWITTER_COOKIES_B64:    ${{ secrets.TWITTER_COOKIES_B64 }}
          DISCORD_BOT_TOKEN:      ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:     ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_USER_DM_ID:     ${{ secrets.DISCORD_USER_DM_ID }}
          ROUTR_SIGNAL_TWITTER_DELAY_S: ${{ vars.ROUTR_X_WATCH_DELAY_S || '10' }}
          ROUTR_X_WATCH_DRY_RUN:  ${{ inputs.dry_run }}
          ROUTR_X_WATCH_FRESH_WINDOW_MINUTES: ${{ inputs.x_watch_window_minutes }}
          ROUTR_X_WATCH_MIN_AGE_MINUTES: ${{ inputs.x_watch_min_age_minutes }}
          ROUTR_X_WATCH_MIN_SCORE: ${{ inputs.x_watch_min_score }}
          ROUTR_X_WATCH_MAX_ALERTS: ${{ inputs.x_watch_max_alerts }}
        run: routr-x-watch

      - name: Save pipeline state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/intel.db
            data/intel.db-shm
            data/intel.db-wal
            data/cache/anchors-*.json
          key: ${{ env.PIPELINE_CACHE_KEY }}

  # ---------------------------------------------------------------------------
  # DISPATCH: poll Discord reactions, post via Buffer / Beehiiv
  # ---------------------------------------------------------------------------
  dispatch:
    if: |
      github.event.schedule == '15,30,45 * * * *' ||
      (github.event_name == 'workflow_dispatch' && inputs.task == 'dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Restore pipeline state
        # Path list MUST match the daily / synthesis / x_burst jobs exactly,
        # otherwise actions/cache treats them as different "cache versions"
        # and the dispatch worker can't see the daily's intel.db. Include
        # the anchors-*.json glob even though dispatch doesn't read it --
        # the version hash depends on the path list, not on whether the
        # file is used.
        uses: actions/cache/restore@v4
        with:
          path: |
            data/intel.db
            data/intel.db-shm
            data/intel.db-wal
            data/cache/anchors-*.json
          key: ${{ env.PIPELINE_CACHE_KEY }}
          restore-keys: |
            pipeline-state-

      - name: Run dispatch worker
        env:
          DISCORD_BOT_TOKEN:      ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:     ${{ secrets.DISCORD_CHANNEL_ID }}
          BUFFER_ACCESS_TOKEN:    ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_ORG_ID:          ${{ secrets.BUFFER_ORG_ID }}
          BUFFER_X_CHANNEL_ID:    ${{ secrets.BUFFER_X_CHANNEL_ID }}
          BEEHIIV_API_KEY:        ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
        run: routr-dispatch

      - name: Save pipeline state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/intel.db
            data/intel.db-shm
            data/intel.db-wal
            data/cache/anchors-*.json
          key: ${{ env.PIPELINE_CACHE_KEY }}
