name: weekly-synthesis

on:
  schedule:
    # Sunday 14:00 UTC — 19:30 IST, 09:00 EST, 15:00 CET.
    - cron: "0 14 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: weekly-synthesis
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Restore pipeline state (read intel.db that daily-signals built)
        # We read from the most recent daily-signals cache. Synthesis itself only
        # appends a `runs` row + `posts` row; no source dedupe writes.
        uses: actions/cache/restore@v4
        with:
          path: |
            data/intel.db
            data/intel.db-shm
            data/intel.db-wal
            data/cache/anchors-*.json
          key: pipeline-state-${{ github.run_id }}
          restore-keys: |
            pipeline-state-

      - name: Run synthesis
        env:
          ROUTR_SIGNAL_LLM_PROVIDER:      ${{ vars.ROUTR_SIGNAL_LLM_PROVIDER      || 'anthropic' }}
          ROUTR_SIGNAL_LLM_MODEL:         ${{ vars.ROUTR_SIGNAL_LLM_MODEL }}
          ROUTR_SIGNAL_DRAFTER_PROVIDER:  ${{ vars.ROUTR_SIGNAL_DRAFTER_PROVIDER  || 'gemini' }}
          ROUTR_SIGNAL_DRAFTER_MODEL:     ${{ vars.ROUTR_SIGNAL_DRAFTER_MODEL     || 'gemini-3-pro-preview' }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL:    ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: routr-synthesize

      - name: Save updated state back to the cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/intel.db
            data/intel.db-shm
            data/intel.db-wal
            data/cache/anchors-*.json
          key: pipeline-state-${{ github.run_id }}
