# Routr-specific angles. Claude uses these to score `routr_relevance` and to draft post hooks.
routr_angles:
  - typescript edge gateway eliminates Python cold-starts
  - direct provider routing avoids 5% openrouter token markup
  - self-hosted vpc deployment for hipaa/fintech compliance
  - mcp gateway category is being formed; first-mover narrative
  - PHI/PII redaction middleware before request hits provider
  - deterministic guardrails as response to AI trust deficit
  - semantic caching across providers
  - 100% cost attribution per request

# Subjects to suppress (avoid noise even if keywords match).
suppress_if_contains:
  - "i'm hiring"
  - "we're hiring"
  - "for sale"
  - "blogspam"
  - giveaway
