  # Direct product names (competitors + the category)
  - openrouter
  - litellm
  - portkey
  - helicone
  - bifrost
  - langfuse
  - langwatch
  - langsmith
  - traceloop
  - openllmetry
  - braintrust
  - openmeter
  - llm gateway
  - ai gateway
  - llm proxy
  - inference gateway
  - llmops
  - mcp gateway
  - model context protocol

  # Provider names that show up in pain posts
  - anthropic
