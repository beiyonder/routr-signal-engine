# Pain-signal keyword filter.
# Two purposes:
#   1) Cheap pre-filter on raw items before paying Claude tokens.
#   2) Hint phrases passed to Claude so it knows what to score highly.

# Items must match at least one phrase in `must_match_any` to be sent to Claude.
# Case-insensitive substring match. Keep this list permissive — Claude does the real filtering.
