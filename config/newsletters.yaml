# Curated newsletter RSS sources.
#
# These are author-edited, high-density signals. The cosine prefilter usually
# keeps the bulk of each feed (low noise floor compared to social platforms),
# but the keyword prefilter still trims off-topic items (sports issues etc.).
#
# Each feed is identified by `name`; the dedupe id is "newsletter-<sha1(url)>".

feeds:
  - name: latent-space
    url: https://www.latent.space/feed
    max_items_per_run: 10

  # The Batch (deeplearning.ai) does not expose an RSS feed on the new
  # thebatch.ai SPA as of 2026-05-17. Treat as manual paste-in if needed.

  - name: import-ai
    url: https://jack-clark.net/feed/
    max_items_per_run: 10

  - name: ahead-of-ai
    url: https://magazine.sebastianraschka.com/feed
    max_items_per_run: 8

  - name: lastweek-in-ai
    url: https://lastweekin.ai/feed
    max_items_per_run: 8

  - name: simon-willison
    url: https://simonwillison.net/atom/everything/
    max_items_per_run: 12

  - name: hamel-husain
    # Quarto blog index feed (verified 2026-05-17).
    url: https://hamel.dev/index.xml
    max_items_per_run: 6

# Per-request throttle and UA shared across feeds.
min_seconds_between_requests: 2.0
user_agent: "routr-signal-engine/0.1 (+https://github.com/beiyonder/routr-signal-engine)"
