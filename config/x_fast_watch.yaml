# Fast X reply watchlist.
#
# Purpose: alert the operator via Discord DM when high-signal AI accounts post
# something worth replying to while it is still fresh. This is separate from
# config/twitter_watch.yaml, which feeds the daily gateway/router digest.
#
# We use grouped `from:` searches instead of visiting every profile. That keeps
# the request count low enough for a 15-minute cron lane.

fetch:
  fresh_window_minutes: 20
  max_results_per_group: 12
  accounts_per_group: 8
  request_delay_seconds: 10
  total_max_items: 60
  min_score: 0.72
  max_alerts_per_run: 3
  include_replies: false

