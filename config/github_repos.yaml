# GitHub repositories whose Issues tab we scan daily for fresh competitor pain.
# Each new open issue is checked against `keywords.yaml`'s `must_match_any`
# and then classified by Claude.
#
# Optional `labels` array narrows to issues with at least one matching label.
# Leave empty to scan everything.

repos:
  # Direct competitor gateways
  - owner: BerriAI
    name: litellm
    labels: []
    max_items_per_run: 25

  - owner: Portkey-AI
    name: gateway
    labels: []
    max_items_per_run: 15

  - owner: Helicone
    name: helicone
    labels: []
    max_items_per_run: 12

  - owner: maximhq
    name: bifrost
    labels: []
    max_items_per_run: 12

  # Observability / tracing adjacencies
  - owner: langfuse
    name: langfuse
    labels: []
    max_items_per_run: 12

  - owner: traceloop
    name: openllmetry
    labels: []
    max_items_per_run: 10

  - owner: langwatch
    name: langwatch
    labels: []
    max_items_per_run: 10

  # Eval frameworks (their bug reports tell us what users actually do with LLMs)
  - owner: explodinggradients
    name: ragas
    labels: []
    max_items_per_run: 8

  - owner: confident-ai
    name: deepeval
    labels: []
    max_items_per_run: 8

  # Agent frameworks
  - owner: langchain-ai
    name: langgraph
    labels: []
    max_items_per_run: 10

  - owner: crewAIInc
    name: crewAI
    labels: []
    max_items_per_run: 10

  - owner: pydantic
    name: pydantic-ai
    labels: []
    max_items_per_run: 8

lookback_hours: 30
include_comments: false
